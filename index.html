<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pareidolia Lab – Firefly Swirl Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
/* ----------- Global Style Reset ----------- */
html, body {
  margin: 0; padding: 0;
  height: 100%; width: 100%;
  overflow: hidden;
  background: #0b0e14;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

/* ----------- Canvas Fullscreen ----------- */
#glcanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}

/* ----------- UI Panel (modern/glassmorphic) ----------- */
#ui {
  position: absolute;
  top: 24px; left: 24px;
  width: 300px;
  padding: 20px;
  border-radius: 16px;

  backdrop-filter: blur(22px) saturate(140%);
  background: rgba(20, 24, 35, 0.55);
  border: 1px solid rgba(255,255,255,0.08);

  color: #e8edf5;
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
}

#ui h1 {
  font-size: 20px;
  margin-bottom: 0;
  font-weight: 600;
  color: #ffffff;
}

#ui p {
  margin-top: 4px;
  font-size: 14px;
  color: #aab6c9;
}

/* controls */
label {
  display: block;
  font-size: 13px;
  margin-top: 16px;
  margin-bottom: 4px;
  color: #cfd8e6;
}
input[type=range] {
  width: 100%;
}

.switch {
  margin-top: 12px;
}
</style>
</head>

<body>
<canvas id="glcanvas"></canvas>

<div id="ui">
  <h1>Pareidolia Lab ✦ Firefly Swirl</h1>
  <p>Swirling volumetric painterly clouds with pareidolia hints.</p>

  <label>Swirl Strength</label>
  <input type="range" id="swirl" min="0" max="2" step="0.01" value="1.20"/>

  <label>Cloud Density</label>
  <input type="range" id="density" min="0.1" max="2" step="0.01" value="1.0"/>

  <label>Light Intensity</label>
  <input type="range" id="light" min="0" max="2" step="0.01" value="1.3"/>

  <label>Warmth</label>
  <input type="range" id="warm" min="0" max="1" step="0.01" value="0.65"/>

  <label>Pareidolia Bias</label>
  <input type="range" id="bias" min="0" max="1" step="0.01" value="0.25"/>

  <div class="switch">
    <input type="checkbox" id="anim" checked />
    <label for="anim"> Animate</label>
  </div>
</div>

<script>
/* -----------------------------------------------------------
   WebGL2 Firefly‑Gaze Swirling Cloud Shader
   Hybrid: Raymarch Volumetric Noise + Curl-Noise Swirl + LUT
------------------------------------------------------------- */

const canvas = document.getElementById("glcanvas");
const gl = canvas.getContext("webgl2");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0,0,canvas.width, canvas.height);
}
window.addEventListener("resize", resize);
resize();

/* ------------------ Vertex Shader ------------------ */
const vertexShaderSrc = `#version 300 es
precision highp float;
layout(location=0) in vec2 pos;
out vec2 uv;
void main() {
  uv = pos * 0.5 + 0.5;
  gl_Position = vec4(pos, 0.0, 1.0);
}`;

/* ------------------ Fragment Shader ------------------ */
const fragmentShaderSrc = `#version 300 es
precision highp float;

in vec2 uv;
out vec4 outColor;

uniform float time;
uniform float swirlPower;
uniform float density;
uniform float lightPower;
uniform float warm;
uniform float pareidoliaBias;
uniform vec2 resolution;

/* ------------ Hash / Noise helpers ------------ */
vec3 hash3(vec3 p){
    p = fract(p * 0.3183099 + vec3(0.1,0.2,0.3));
    p *= 17.0;
    return fract(vec3(p.x*p.y, p.y*p.z, p.z*p.x));
}

float noise(vec3 p){
    vec3 i = floor(p);
    vec3 f = fract(p);
    vec3 u = f*f*(3.0-2.0*f);
    return mix(
        mix( mix( dot(hash3(i+vec3(0,0,0)), f - vec3(0,0,0)),
                  dot(hash3(i+vec3(1,0,0)), f - vec3(1,0,0)), u.x),
             mix( dot(hash3(i+vec3(0,1,0)), f - vec3(0,1,0)),
                  dot(hash3(i+vec3(1,1,0)), f - vec3(1,1,0)), u.x), u.y),
        mix( mix( dot(hash3(i+vec3(0,0,1)), f - vec3(0,0,1)),
                  dot(hash3(i+vec3(1,0,1)), f - vec3(1,0,1)), u.x),
             mix( dot(hash3(i+vec3(0,1,1)), f - vec3(0,1,1)),
                  dot(hash3(i+vec3(1,1,1)), f - vec3(1,1,1)), u.x), u.y),
        u.z);
}

/* ----- Curl Noise for Swirl Field ----- */
vec3 curl(vec3 p){
    const float e = 0.1;
    float nx = noise(p + vec3(0,e,0)) - noise(p - vec3(0,e,0));
    float ny = noise(p + vec3(e,0,0)) - noise(p - vec3(e,0,0));
    float nz = noise(p + vec3(0,0,e)) - noise(p - vec3(0,0,e));
    return normalize(vec3(nz - ny, nx - nz, ny - nx));
}

/* ----- Pareidolia hint carved into density ----- */
float pareidoliaFace(vec3 p) {
    // Slight face-like dip in density
    float eyes = exp(-30.0 * (pow(p.x-0.2,2.0)+pow(p.y+0.1,2.0)))
               + exp(-30.0 * (pow(p.x+0.2,2.0)+pow(p.y+0.1,2.0)));
    float mouth = exp(-25.0 * (pow(p.x,2.0)+pow(p.y-0.15,2.0))) * 0.6;
    return (eyes*0.6 + mouth*0.4) * pareidoliaBias;
}

/* ------------- Raymarch Volumetric Cloud ------------- */
vec4 renderCloud(vec2 uv){
    vec3 rayDir = normalize(vec3((uv - 0.5) * vec2(resolution.x/resolution.y, 1.0), 1.0));
    vec3 rayPos = vec3(0., 0., -2.);

    float t = 0.0;
    float totalDensity = 0.0;
    vec3 colorAccum = vec3(0.0);

    for(int i=0; i<60; i++){
        vec3 p = rayPos + rayDir * t;

        // Apply flow field swirl
        vec3 flow = curl(p*1.5 + time*0.4) * swirlPower * 0.5;
        p += flow;

        float d = noise(p*2.0) * density;

        // Pareidolia hint
        d += pareidoliaFace(p);

        d = max(d - 0.3, 0.0);

        float stepDensity = d * 0.07;
        totalDensity += stepDensity;

        // Lighting
        float light = clamp(dot(normalize(vec3(0.2,1.0,0.4)), curl(p*2.0))*0.5+0.5,0.0,1.0);
        vec3 warmTint = mix(vec3(0.2,0.3,0.5), vec3(1.0,0.6,0.3), warm);

        colorAccum += warmTint * stepDensity * lightPower * light;

        t += 0.04;
        if (totalDensity > 3.0) break;
    }

    return vec4(colorAccum, 1.0);
}

/* ------------- Final Color Grading ------------- */
vec3 filmic(vec3 x){
    return clamp((x*(0.8*x+0.1))/(x*(0.8*x+0.9)+0.2), 0.0, 1.0);
}

void main() {
    vec4 col = renderCloud(uv);
    outColor = vec4(filmic(col.rgb * 1.5), 1.0);
}
`;

/* ------------------ Shader Loader ------------------ */
function compileShader(type, src){
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if(!gl.getShaderParameter(sh, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(sh));
  return sh;
}

const vs = compileShader(gl.VERTEX_SHADER, vertexShaderSrc);
const fs = compileShader(gl.FRAGMENT_SHADER, fragmentShaderSrc);

const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
gl.useProgram(prog);

/* ------------------ Fullscreen Quad ------------------ */
const quad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quad);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
  -1,-1,  1,-1,  -1,1,  1,1
]), gl.STATIC_DRAW);

gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

/* ------------------ Uniform Handles ------------------ */
const uTime = gl.getUniformLocation(prog, "time");
const uSwirl = gl.getUniformLocation(prog, "swirlPower");
const uDensity = gl.getUniformLocation(prog, "density");
const uLight = gl.getUniformLocation(prog, "lightPower");
const uWarm = gl.getUniformLocation(prog, "warm");
const uBias = gl.getUniformLocation(prog, "pareidoliaBias");
const uRes = gl.getUniformLocation(prog, "resolution");

/* ------------------ UI Binding ------------------ */
const ui = {
  swirl: document.getElementById("swirl"),
  density: document.getElementById("density"),
  light: document.getElementById("light"),
  warm: document.getElementById("warm"),
  bias: document.getElementById("bias"),
  anim: document.getElementById("anim")
};

/* ------------------ Render Loop ------------------ */
let t0 = performance.now();

function render() {
  const t = ui.anim.checked ? (performance.now() - t0) * 0.001 : 0.0;

  gl.uniform1f(uTime, t);
  gl.uniform1f(uSwirl, parseFloat(ui.swirl.value));
  gl.uniform1f(uDensity, parseFloat(ui.density.value));
  gl.uniform1f(uLight, parseFloat(ui.light.value));
  gl.uniform1f(uWarm, parseFloat(ui.warm.value));
  gl.uniform1f(uBias, parseFloat(ui.bias.value));
  gl.uniform2f(uRes, canvas.width, canvas.height);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
